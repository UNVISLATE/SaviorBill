services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-saviorbill}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS is required in .env}
      POSTGRES_DB: ${DB_NAME:-saviorbill}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-saviorbill}"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  billing:
    image: ${IMAGE_PREFIX:-ghcr.io/unvislate/saviorbill}/billing:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: db
      DB_PORT: 5432
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
    volumes:
      - ../data:/app/data:rw
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app:app --app-dir src --host 0.0.0.0 --port 8000"
    expose:
      - "8000"

  luaworker:
    image: ${IMAGE_PREFIX:-ghcr.io/unvislate/saviorbill}/luaworker:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_DB: 0
      BILLING_URL: http://billing:8000
    volumes:
      - ../data:/app/data:ro

  mediaworker:
    image: ${IMAGE_PREFIX:-ghcr.io/unvislate/saviorbill}/mediaworker:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: db
      DB_PORT: 5432
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_DB: 0
      DATA_DIR: /app/data
    volumes:
      - ../data:/app/data:rw

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - billing
      - mediaworker
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../data/media:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  valkeydata:
  caddy_data:
  caddy_config:
