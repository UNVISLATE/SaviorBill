# ТЕСТЫ: оверлей поверх deploy/dev/docker-compose.yml (полный стек + сервис `tests`).
#
# Запуск из корня:
#   docker compose -f deploy/dev/docker-compose.yml -f deploy/test/docker-compose.yml \
#       up --build --abort-on-container-exit --exit-code-from tests
# Либо: make test
services:
  billing:
    environment:
      # Тестовые lua-скрипты лежат отдельно от рантайм-папки.
      LUA_SCRIPTS_DIR: /app/data/tests/lua
      # В интеграционных тестах много регистраций с одного IP — лимитер отключаем.
      RATE_LIMIT_ENABLED: "false"
      # Запас по таймауту lua-вызова для медленного CI.
      LUA_CALL_TIMEOUT: "60"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 3s
      retries: 30

  luaworker:
    environment:
      LUA_SCRIPTS_DIR: /app/data/tests/lua

  mediaworker:
    environment:
      MEDIA_KEEP_ORIGINAL: "false"

  tests:
    build:
      context: ../..
      dockerfile: src/Dockerfile
      target: tests
    depends_on:
      billing:
        condition: service_healthy
      db:
        condition: service_healthy
      mediaworker:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      BASE_URL: http://billing:8000
      MEDIAWORKER_URL: http://mediaworker:8001
      DB_HOST: db
      DB_USER: ${DB_USER:-saviorbill}
      DB_PASS: ${DB_PASS:-test123}
      DB_NAME: ${DB_NAME:-saviorbill}
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
    command: ["pytest", "-m", "unit or integration", "--maxfail=1"]
