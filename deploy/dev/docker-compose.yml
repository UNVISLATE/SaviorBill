services:
  db:
    container_name: saviorpg
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-aiosupport}
      POSTGRES_PASSWORD: ${DB_PASS:-test123}
      POSTGRES_DB: ${DB_NAME:-aiosupport}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aiosupport}"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    container_name: saviorvalkey
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  billing:
    container_name: saviorbill
    build:
      context: ../..
      dockerfile: src/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-aiosupport}
      DB_PASS: ${DB_PASS:-test123}
      DB_NAME: ${DB_NAME:-aiosupport}
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-}
      SECRETS_BACKEND: ${SECRETS_BACKEND:-file}
      SECRETS_KEY: ${SECRETS_KEY:-}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8000}
      LUA_SERVICE_TOKEN: ${LUA_SERVICE_TOKEN:-dev-service-token}
      DATA_DIR: /app/data
      LUA_SCRIPTS_DIR: /app/data/lua
      EMAIL_TEMPLATES_DIR: /app/data/email
      STORAGE_BACKEND: ${STORAGE_BACKEND:-fs}
      OWNER_LOGIN: ${OWNER_LOGIN:-owner}
      OWNER_PASS: ${OWNER_PASS:-owner-change-me}
      OWNER_EMAIL: ${OWNER_EMAIL:-owner@example.test}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      BILLING_LOOP_ENABLED: ${BILLING_LOOP_ENABLED:-true}
    volumes:
      - ../../data:/app/data:rw
    command: >
      sh -c "alembic upgrade head &&
             python src/app.py"
    ports:
      - "8000:8000"

  luaworker:
    container_name: saviorlua
    build:
      context: ../../luaworker
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_DB: 0
      LUA_TASK_STREAM: lua:tasks
      LUA_RESP_STREAM: lua:results
      LUA_GROUP: luaworkers
      BILLING_URL: http://billing:8000
      LUA_SERVICE_TOKEN: ${LUA_SERVICE_TOKEN:-dev-service-token}
      LUA_SCRIPTS_DIR: /app/data/lua
    volumes:
      - ../../data:/app/data:ro

  mediaworker:
    container_name: saviormedia
    build:
      context: ../../mediaworker
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-aiosupport}
      DB_PASS: ${DB_PASS:-test123}
      DB_NAME: ${DB_NAME:-aiosupport}
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_DB: 0
      DATA_DIR: /app/data
      JWT_SECRET: ${JWT_SECRET:-}
      MEDIA_TASK_STREAM: media:tasks
      MEDIA_RESULT_STREAM: media:results
      MEDIA_GROUP: mediaworkers
      MEDIA_UPLOADS_PER_HOUR: ${MEDIA_UPLOADS_PER_HOUR:-30}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-fs}
      MEDIA_STATUS_TTL: ${MEDIA_STATUS_TTL:-3600}
      MEDIA_BAN_SECONDS: ${MEDIA_BAN_SECONDS:-180}
      MEDIA_KEEP_ORIGINAL: ${MEDIA_KEEP_ORIGINAL:-false}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_KEY: ${S3_KEY:-}
      S3_SECRET: ${S3_SECRET:-}
    volumes:
      - ../../data:/app/data:rw
    ports:
      - "8001:8001"

volumes:
  pgdata:
