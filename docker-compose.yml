services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-aiosupport}
      POSTGRES_PASSWORD: ${DB_PASS:-test123}
      POSTGRES_DB: ${DB_NAME:-aiosupport}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aiosupport}"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  billing:
    build: .
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-aiosupport}
      DB_PASS: ${DB_PASS:-test123}
      DB_NAME: ${DB_NAME:-aiosupport}
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-}
      SECRETS_BACKEND: ${SECRETS_BACKEND:-file}
      SECRETS_KEY: ${SECRETS_KEY:-}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8000}
      LUA_SERVICE_TOKEN: ${LUA_SERVICE_TOKEN:-dev-service-token}
      DATA_DIR: /app/data
      LUA_SCRIPTS_DIR: /app/data/lua
      EMAIL_TEMPLATES_DIR: /app/data/email
      STORAGE_BACKEND: ${STORAGE_BACKEND:-fs}
      OWNER_LOGIN: ${OWNER_LOGIN:-owner}
      OWNER_PASS: ${OWNER_PASS:-owner-change-me}
      OWNER_EMAIL: ${OWNER_EMAIL:-owner@example.test}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      BILLING_LOOP_ENABLED: ${BILLING_LOOP_ENABLED:-true}
    volumes:
      - ./data:/app/data:rw
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app:app --app-dir src --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  luaworker:
    build: ./luaworker
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_DB: 0
      LUA_TASK_STREAM: lua:tasks
      LUA_RESP_STREAM: lua:results
      LUA_GROUP: luaworkers
      LUA_CONSUMER: worker-1
      BILLING_URL: http://billing:8000
      LUA_SERVICE_TOKEN: ${LUA_SERVICE_TOKEN:-dev-service-token}
      LUA_SCRIPTS_DIR: /lua
    volumes:
      - ./data/lua:/lua:ro

volumes:
  pgdata:
