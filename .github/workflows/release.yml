# Сборка и публикация образов в GitHub Container Registry (ghcr.io).
name: Release

on:
  release:
    types: [published]

# На случай повторной публикации/republish того же релиза — не гоняем
# параллельные пересекающиеся ranы.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unit-tests:
    # Общий переиспользуемый workflow с ci.yml — один источник правды на
    # тестовые шаги.
    uses: ./.github/workflows/unit-tests.yml

  publish:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: billing
            context: .
            file: src/Dockerfile
            target: runtime
          - name: luaworker
            context: ./luaworker
            file: ./luaworker/Dockerfile
            target: ""
          - name: mediaworker
            context: ./mediaworker
            file: ./mediaworker/Dockerfile
            target: runtime
    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools_scm вычисляет версию из git-тегов — стандартный
          # shallow-чекаут Actions (depth=1, без тегов) их не увидит.
          fetch-depth: 0
          fetch-tags: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute app version (setuptools_scm)
        if: matrix.name != 'luaworker'
        run: |
          pip install --quiet setuptools_scm
          python -c "from setuptools_scm import get_version; open('VERSION', 'w').write(get_version(fallback_version='0.0.0-dev'))"
          if [ "${{ matrix.name }}" = "mediaworker" ]; then cp VERSION mediaworker/VERSION; fi
          echo "Resolved version: $(cat VERSION)"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}
            type=raw,value=${{ github.event.release.tag_name }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-complete:
    # Единая точка "весь набор образов релиза опубликован успешно" — матрица
    # publish и так гарантирует это через needs, но отдельная джоба даёт
    # понятную точку для последующих уведомлений/тега "released" и защищает
    # от иллюзии "релиз готов", если хотя бы один образ матрицы не собрался
    runs-on: ubuntu-latest
    needs: [publish]
    steps:
      - name: All images published
        run: |
          echo "release ${{ github.event.release.tag_name }}: all images (billing/luaworker/mediaworker) published successfully"
