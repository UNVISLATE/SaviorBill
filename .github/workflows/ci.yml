name: CI

on:
  push:
    branches: [main, master]
    # Чисто документационные/adminui-only изменения не гоняют тяжёлый
    # docker-стек (см. upd_plan.md, часть 1, п.8). Если правится и код, и
    # доки в одном PR — фильтр не сработает (это ОК, значит есть что тестить).
    paths-ignore:
      - "docs/**"
      - "adminui/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "adminui/**"
      - "**/*.md"

# Отменяем предыдущий незавершённый запуск на том же ref при новом push —
# экономит CI-минуты и не даёт устаревшему коммиту обогнать актуальный по
# времени завершения (см. upd_plan.md, часть 1, п.7).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    uses: ./.github/workflows/unit-tests.yml

  compose-config-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate prod docker-compose config
        # Дешёвая защита от опечаток в deploy/docker-compose.yml (то, что
        # реально получают пользователи через setup.sh) — этот файл раньше
        # никогда не проверялся в CI (см. upd_plan.md, часть 1, п.6).
        # `config` только парсит/интерполирует, ничего не запускает.
        working-directory: deploy
        env:
          DB_PASS: dummy-for-config-validation-only
        run: docker compose -f docker-compose.yml config -q

  integration:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build & run full stack with integration tests
        run: |
          docker compose -f deploy/dev/docker-compose.yml -f deploy/test/docker-compose.yml \
            up --build --abort-on-container-exit --exit-code-from tests
      - name: Tear down
        if: always()
        run: |
          docker compose -f deploy/dev/docker-compose.yml -f deploy/test/docker-compose.yml down -v

