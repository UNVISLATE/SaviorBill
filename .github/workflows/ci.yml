name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install -r src/requirements-dev.txt
      - name: Run unit tests
        env:
          PYTHONPATH: src
          DB_PASS: ci
          JWT_SECRET: ci-secret-ci-secret-ci-secret-32
        run: pytest -c deploy/test/pytest.ini --rootdir=. -m unit

  mediaworker-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mediaworker deps
        run: pip install -r mediaworker/requirements.txt -r mediaworker/requirements-dev.txt
      - name: Run mediaworker unit tests
        working-directory: mediaworker
        env:
          PYTHONPATH: src
        run: pytest -q

  integration:
    runs-on: ubuntu-latest
    needs: [unit, mediaworker-unit]
    steps:
      - uses: actions/checkout@v4
      - name: Build & run full stack with integration tests
        run: |
          docker compose -f deploy/dev/docker-compose.yml -f deploy/test/docker-compose.yml \
            up --build --abort-on-container-exit --exit-code-from tests
      - name: Tear down
        if: always()
        run: |
          docker compose -f deploy/dev/docker-compose.yml -f deploy/test/docker-compose.yml down -v

  # Сборка и публикация образов в GitHub Container Registry (ghcr.io).
  # Запускается ТОЛЬКО при публикации релиза (release: published). Релиз привязан
  # к git-тегу вида 1.0.0 (или v1.0.0) — из него берутся теги образа: 1.0.0, 1.0,
  # 1 и latest. latest не сдвигается для пре-релизов. Тесты (unit+integration)
  # гоняются на коммите релиза перед публикацией.
  publish:
    runs-on: ubuntu-latest
    needs: [unit, mediaworker-unit, integration]
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: billing
            context: .
            file: src/Dockerfile
            target: runtime
          - name: luaworker
            context: ./luaworker
            file: ./luaworker/Dockerfile
            target: ""
          - name: mediaworker
            context: ./mediaworker
            file: ./mediaworker/Dockerfile
            target: runtime
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}
            type=raw,value=${{ github.event.release.tag_name }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
