name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install -r src/requirements-dev.txt
      - name: Run unit tests
        env:
          PYTHONPATH: src
          DB_PASS: ci
          JWT_SECRET: ci-secret-ci-secret-ci-secret-32
        run: pytest -c deploy/test/pytest.ini --rootdir=. -m unit

  mediaworker-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mediaworker deps
        run: pip install -r mediaworker/requirements.txt -r mediaworker/requirements-dev.txt
      - name: Run mediaworker unit tests
        working-directory: mediaworker
        env:
          PYTHONPATH: src
        run: pytest -q

  integration:
    runs-on: ubuntu-latest
    needs: [unit, mediaworker-unit]
    steps:
      - uses: actions/checkout@v4
      - name: Build & run full stack with integration tests
        run: |
          docker compose -f deploy/dev/docker-compose.yml -f deploy/test/docker-compose.yml \
            up --build --abort-on-container-exit --exit-code-from tests
      - name: Tear down
        if: always()
        run: |
          docker compose -f deploy/dev/docker-compose.yml -f deploy/test/docker-compose.yml down -v

