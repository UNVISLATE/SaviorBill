name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # Быстрые юнит-тесты без внешних сервисов. Это первый барьер.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: Run unit tests
        env:
          DB_PASS: ci
          JWT_SECRET: ci-secret-ci-secret-ci-secret-32
        run: pytest -m unit

  # Полный интеграционный прогон против реально поднятого стека в Docker.
  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - name: Build & run full stack with integration tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml \
            up --build --abort-on-container-exit --exit-code-from tests
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v
