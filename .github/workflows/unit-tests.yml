# Переиспользуемый workflow: юнит-тесты billing + mediaworker.
name: Unit tests (reusable)

on:
  workflow_call:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install -r src/requirements-dev.txt
      - name: Run unit tests
        env:
          PYTHONPATH: src
          DB_PASS: ci
          JWT_SECRET: ci-secret-ci-secret-ci-secret-32
        run: pytest -c deploy/test/pytest.ini --rootdir=. -m unit

  mediaworker-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install mediaworker deps
        run: pip install -r mediaworker/requirements.txt -r mediaworker/requirements-dev.txt
      - name: Run mediaworker unit tests
        working-directory: mediaworker
        env:
          PYTHONPATH: src
        run: pytest -q
